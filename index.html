<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW-Dormitory | ระบบหอพักนักเรียน</title>
    
    <!-- ฟอนต์ Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- SheetJS for Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: { primary: '#ec4899', secondary: '#3b82f6', dark: '#0f172a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .bg-gradient-theme { background: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%); }
        .text-gradient { background: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-800">

    <div id="app" class="flex-grow flex flex-col"></div>

    <footer class="mt-auto py-8 text-center text-gray-400 text-sm font-medium bg-transparent">
        <div class="flex flex-col items-center justify-center gap-2">
            <div class="flex items-center gap-2">
                <img src="https://img2.pic.in.th/logo-SW.png" alt="Logo" class="w-5 h-5 grayscale opacity-70">
                <span>โรงเรียนศรีวารินทร์</span>
            </div>
            <p>ระบบหอพักนักเรียน - สพม. นราธิวาส (Powered by Firebase)</p>
            <p class="text-xs mt-1">&lt;\dev&gt; อับดุลฮากิม อ๊ะหมะ</p>
        </div>
    </footer>

    <script>
        // ==========================================
        // ⚡️ 1. ตั้งค่าการเชื่อมต่อฐานข้อมูล
        // ==========================================
        
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzG0yQdJ035qEeE3bOZEB8q3W-ODvojnvFS9E9BD8kMJWSpaGQb0OzVsBPjxfRbTkiE/exec";
        const LOGO_URL = "https://img2.pic.in.th/logo-SW.png";
        
        let firebaseConfig;
        
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyB8TyuzvyJ41hfxJHjT8ufSB62GDB4Kk6o",
                authDomain: "sw-dormitory.firebaseapp.com",
                projectId: "sw-dormitory",
                storageBucket: "sw-dormitory.firebasestorage.app",
                messagingSenderId: "126620559439",
                appId: "1:126620559439:web:7b4fb1c76d9b7ea1c1e23a",
                measurementId: "G-28SV6XB2S4"
            };
        }

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const getColPath = (colName) => {
            if (typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined') {
                return `artifacts/${__app_id}/public/data/${colName}`;
            }
            return colName;
        };

        // ==========================================
        // 2. State Management & Real-time Data
        // ==========================================
        let currentUser = null; 
        let currentView = 'login'; 
        let loginTab = 'student'; 
        let cameraStream = null;
        let currentPosition = null;
        let isDbInitialized = false;

        let appData = {
            settings: { targetLat: 6.4255, targetLng: 101.8252, radius: 50 },
            guardians: [], groups: [], students: [], checkinHistory: [], leaveRequests: [], scoreHistory: [], readingHistory: []
        };

        // ==========================================
        // 3. Firebase Listeners (Real-time Sync)
        // ==========================================
        async function initFirebase() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `<div class="flex-grow flex items-center justify-center flex-col"><i class="fa-solid fa-circle-notch fa-spin text-5xl text-pink-500 mb-4"></i><p class="text-gray-500 font-semibold animate-pulse">กำลังเชื่อมต่อฐานข้อมูล...</p></div>`;

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } catch (error) {
                console.warn("Auth initialization notice:", error);
            }

            db.collection(getColPath('settings')).doc('main').onSnapshot(doc => {
                if(doc.exists) appData.settings = doc.data();
                else db.collection(getColPath('settings')).doc('main').set(appData.settings);
                if(isDbInitialized) render();
            }, err => console.error(err));

            const collectionsToSync = ['guardians', 'groups', 'students', 'checkinHistory', 'leaveRequests', 'scoreHistory', 'readingHistory'];
            
            const promises = collectionsToSync.map(col => {
                return new Promise(resolve => {
                    db.collection(getColPath(col)).onSnapshot(snapshot => {
                        appData[col] = snapshot.docs.map(d => d.data());
                        
                        if (currentUser) {
                            if (currentUser.role === 'student' && col === 'students') {
                                currentUser.data = appData.students.find(s => String(s.id) === String(currentUser.data.id)) || currentUser.data;
                            } else if (currentUser.role === 'guardian' && col === 'guardians') {
                                currentUser.data = appData.guardians.find(g => String(g.id) === String(currentUser.data.id)) || currentUser.data;
                            }
                        }
                        
                        if(isDbInitialized) render();
                        resolve(); 
                    }, err => {
                        console.error(`Error loading ${col}:`, err);
                        resolve();
                    });
                });
            });

            await Promise.all(promises);
            isDbInitialized = true;
            render(); 
        }

        window.initApp = initFirebase;

        async function apiCall(action, payload = {}) {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, payload: payload })
                });
                const result = await response.json();
                return result.status === 'success' ? result.data : null;
            } catch (error) { 
                console.error("API Fetch Error:", error); 
                return null; 
            }
        }

        // ==========================================
        // 4. Core Render
        // ==========================================
        function render() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = ''; 

            if (!currentUser) {
                appDiv.innerHTML = getLoginView();
            } else {
                appDiv.innerHTML += getNavbar();
                const contentDiv = document.createElement('div');
                contentDiv.className = 'container mx-auto px-4 py-8 flex-grow';
                
                if (currentUser.role === 'student') {
                    if (currentView === 'student_dash') contentDiv.innerHTML = getStudentDashboard();
                    else if (currentView === 'student_checkin') contentDiv.innerHTML = getStudentCheckInOut();
                    else if (currentView === 'student_leave') contentDiv.innerHTML = getStudentLeave();
                } else if (currentUser.role === 'guardian') {
                    if (currentView === 'guardian_dash') contentDiv.innerHTML = getGuardianDashboard();
                    else if (currentView === 'guardian_read') contentDiv.innerHTML = getGuardianReading();
                    else if (currentView === 'guardian_req') contentDiv.innerHTML = getGuardianRequests();
                    else if (currentView === 'guardian_all_students') contentDiv.innerHTML = getGuardianAllStudents();
                } else if (currentUser.role === 'admin') {
                    if (currentView === 'admin_dash') contentDiv.innerHTML = getAdminDashboard();
                }
                appDiv.appendChild(contentDiv);
            }

            if (currentView === 'student_checkin' && currentUser && currentUser.data.status !== 'in') {
                startCamera();
            } else {
                stopCamera();
            }
        }

        function navigate(view) { currentView = view; render(); }

        // ==========================================
        // 5. Views (HTML Templates)
        // ==========================================
        function getNavbar() {
            const role = currentUser.role;
            let name = currentUser.role === 'admin' ? 'ผู้ดูแลระบบสูงสุด' : currentUser.data.name;
            let menuItems = '';

            if (role === 'student') {
                menuItems = `
                    <button onclick="navigate('student_dash')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'student_dash' ? 'bg-white/20 font-bold' : ''}">หน้าแรก</button>
                    <button onclick="navigate('student_checkin')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'student_checkin' ? 'bg-white/20 font-bold' : ''}">เข้า-ออกหอพัก</button>
                    <button onclick="navigate('student_leave')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'student_leave' ? 'bg-white/20 font-bold' : ''}">ขออนุญาต</button>
                `;
            } else if (role === 'guardian') {
                menuItems = `
                    <button onclick="navigate('guardian_dash')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'guardian_dash' ? 'bg-white/20 font-bold' : ''}">แผงควบคุม</button>
                    <button onclick="navigate('guardian_all_students')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'guardian_all_students' ? 'bg-white/20 font-bold' : ''}">นักเรียนหอทั้งหมด</button>
                    <button onclick="navigate('guardian_read')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'guardian_read' ? 'bg-white/20 font-bold' : ''}">บันทึกการอ่าน</button>
                    <button onclick="navigate('guardian_req')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'guardian_req' ? 'bg-white/20 font-bold' : ''}">จัดการคำขอ</button>
                `;
            } else if (role === 'admin') {
                menuItems = `<button onclick="navigate('admin_dash')" class="bg-white/20 px-3 py-2 rounded font-bold transition">จัดการระบบ</button>`;
            }

            const roleLabels = { 'student': 'นักเรียนหอพัก', 'guardian': 'ครูผู้ดูแล', 'admin': 'ผู้ดูแลระบบ' };

            return `
                <nav class="bg-gradient-theme text-white shadow-lg sticky top-0 z-50">
                    <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('${role}_dash')">
                            <img src="${LOGO_URL}" alt="Logo" class="h-10 w-10 bg-white rounded-full p-1 shadow">
                            <span class="font-bold text-xl hidden sm:block">SW-Dorm</span>
                        </div>
                        <div class="flex items-center gap-2 md:gap-4 overflow-x-auto text-sm md:text-base">
                            ${menuItems}
                        </div>
                        <div class="flex items-center gap-3 mt-3 w-full md:w-auto md:mt-0 justify-end border-t border-white/20 md:border-none pt-2 md:pt-0">
                            <div class="text-right leading-tight hidden md:block">
                                <p class="text-sm font-semibold">${name}</p>
                                <p class="text-xs text-blue-200">${roleLabels[role]}</p>
                            </div>
                            <button onclick="handleLogout()" class="bg-white text-pink-600 hover:bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold shadow transition flex items-center gap-2"><i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">ออก</span></button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function getLoginView() {
            return `
                <div class="flex-grow flex flex-col items-center justify-center p-4">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative z-10">
                        <div class="bg-gradient-theme p-6 text-center text-white">
                            <img src="${LOGO_URL}" alt="Logo" class="h-20 w-20 mx-auto bg-white rounded-full p-2 shadow-md mb-3 border-2 border-pink-200">
                            <h1 class="text-2xl font-bold">SW-Dormitory V2</h1>
                            <p class="text-sm opacity-90 mt-1">ระบบจัดการหอพักนักเรียน</p>
                        </div>
                        <div class="flex border-b">
                            <button onclick="loginTab='student'; render();" class="flex-1 py-3 font-semibold transition ${loginTab === 'student' ? 'text-pink-600 border-b-2 border-pink-600 bg-pink-50' : 'text-gray-500 hover:text-pink-400'}"><i class="fa-solid fa-user-graduate mr-2"></i>นักเรียน</button>
                            <button onclick="loginTab='guardian'; render();" class="flex-1 py-3 font-semibold transition ${loginTab === 'guardian' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:text-blue-400'}"><i class="fa-solid fa-user-tie mr-2"></i>ครูผู้ดูแล</button>
                        </div>
                        <div class="p-6">
                            ${loginTab === 'student' ? `
                                <div>
                                    <label class="block text-sm font-bold mb-2">รหัสนักเรียน</label>
                                    <input type="text" id="stuId" class="w-full p-3 rounded-lg bg-gray-50 border focus:bg-white focus:ring-2 focus:ring-pink-500 outline-none" placeholder="เช่น 04001" onkeypress="if(event.key==='Enter') loginStudent()">
                                    <button onclick="loginStudent()" class="w-full mt-6 bg-gradient-theme text-white font-bold py-3 rounded-lg shadow hover:shadow-lg transition">เข้าสู่ระบบนักเรียน</button>
                                </div>
                            ` : `
                                <div>
                                    <label class="block text-sm font-bold mb-2">รหัสผู้ดูแล</label>
                                    <input type="text" id="gId" class="w-full p-3 mb-4 rounded-lg bg-gray-50 border focus:ring-2 focus:ring-blue-500 outline-none" placeholder="เช่น G001">
                                    <label class="block text-sm font-bold mb-2">PIN (6 หลัก)</label>
                                    <input type="password" id="gPin" class="w-full p-3 rounded-lg bg-gray-50 border focus:ring-2 focus:ring-blue-500 outline-none" placeholder="******" onkeypress="if(event.key==='Enter') loginGuardian()">
                                    <button onclick="loginGuardian()" class="w-full mt-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:shadow-lg transition">เข้าสู่ระบบครูผู้ดูแล</button>
                                </div>
                            `}
                        </div>
                    </div>
                    <button onclick="promptAdminLogin()" class="mt-6 text-sm text-gray-400 hover:text-gray-600 flex items-center gap-1"><i class="fa-solid fa-shield-halved"></i> สำหรับผู้ดูแลระบบ</button>
                </div>
            `;
        }

        const getReqDate = (r) => {
            if (r.createdAt) return new Date(r.createdAt);
            const parts = String(r.id).split('-');
            if (parts.length > 1 && !isNaN(parts[1])) return new Date(parseInt(parts[1]));
            return new Date(r.outDate || 0);
        };

        // --- Student ---
        function getStudentDashboard() {
            const s = currentUser.data;
            const readPct = s.readTarget === 0 ? 100 : (s.readTarget > 0 ? Math.min(100, Math.round(((s.pagesRead || 0) / s.readTarget) * 100)) : 0);
            const myReadHistory = appData.readingHistory.filter(h => h.studentId === s.id).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 7);
            const myHistory = appData.checkinHistory.filter(h => h.studentId === s.id).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 7);
            const myRequests = appData.leaveRequests.filter(r => r.studentId === s.id).sort((a,b) => getReqDate(b) - getReqDate(a)).slice(0, 7);

            const myGroup = appData.groups.find(g => g.id === s.groupId);
            const groupName = myGroup ? myGroup.name : '-';
            const myGuardian = myGroup ? appData.guardians.find(g => g.id === myGroup.guardianId) : null;
            const guardianName = myGuardian ? myGuardian.name : '-';

            return `
                <div class="mb-6"><h2 class="text-2xl font-bold text-gray-800">แผงควบคุมนักเรียน</h2><p class="text-gray-500">ยินดีต้อนรับ, ${s.name}</p></div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white rounded-xl shadow p-6 border-t-4 border-pink-500 flex flex-col md:flex-row items-center gap-6 lg:col-span-1">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=ec4899&color=fff&size=100" class="rounded-full shadow-lg border-2 border-white">
                        <div class="w-full text-sm">
                            <p class="text-gray-500 text-xs">รหัส: <strong class="text-gray-800 text-sm">${s.id}</strong></p>
                            <p class="text-gray-500 text-xs mt-1">ห้องพัก: <strong class="text-blue-600 text-sm">${s.room} / ${s.bed}</strong></p>
                            <p class="text-gray-500 text-xs mt-1">กลุ่ม: <strong class="text-gray-800 text-sm">${groupName}</strong></p>
                            <p class="text-gray-500 text-xs mt-1">ผู้ดูแล: <strong class="text-gray-800 text-sm">${guardianName}</strong></p>
                            <p class="mt-3 text-lg font-bold ${s.status === 'in' ? 'text-green-500' : 'text-orange-500'}">
                                <i class="fa-solid ${s.status === 'in' ? 'fa-house-user' : 'fa-person-walking-arrow-right'}"></i> ${s.status === 'in' ? 'อยู่ในหอพัก' : 'อยู่นอกหอพัก'}
                            </p>
                        </div>
                    </div>
                    <div class="bg-gradient-theme rounded-xl shadow p-6 text-white text-center flex flex-col justify-center cursor-pointer hover:shadow-lg transition transform hover:-translate-y-1" onclick="viewScoreHistory('${s.id}')" title="คลิกเพื่อดูประวัติคะแนน">
                        <p class="text-sm opacity-90 mb-1">คะแนนพฤติกรรม</p>
                        <div class="text-5xl font-bold">${s.score}<span class="text-xl font-normal">/100</span></div>
                        <p class="text-xs mt-2 opacity-80"><i class="fa-solid fa-hand-pointer mr-1"></i>คลิกเพื่อดูประวัติ</p>
                    </div>
                    <div class="bg-gradient-to-br from-teal-400 to-emerald-600 rounded-xl shadow p-6 text-white flex flex-col justify-center">
                        <div class="flex justify-between items-end mb-2">
                            <p class="text-sm opacity-90"><i class="fa-solid fa-book-open mr-1"></i>ความก้าวหน้าการอ่าน</p>
                            <p class="text-2xl font-bold">${s.pagesRead || 0}<span class="text-sm font-normal">/${s.readTarget} หน้า</span></p>
                        </div>
                        <div class="w-full bg-white/30 rounded-full h-3 mt-2 overflow-hidden"><div class="bg-white h-3 rounded-full" style="width: ${readPct}%"></div></div>
                        <p class="text-right text-xs mt-1">${readPct}% สำเร็จ</p>
                    </div>
                </div>
                
                <!-- ประวัติการอ่านของฉัน -->
                <div class="bg-white rounded-xl shadow overflow-hidden mb-6">
                    <div class="p-4 bg-teal-50 border-b border-teal-100 flex justify-between items-center">
                        <h3 class="font-bold text-teal-800"><i class="fa-solid fa-list-check mr-2"></i>ประวัติการอ่านล่าสุด</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead><tr class="bg-gray-50 text-gray-600 border-b"><th class="p-3">วัน-เวลา</th><th class="p-3">ประเภท</th><th class="p-3">หน้าที่อ่าน</th><th class="p-3 text-center">สถานะ</th><th class="p-3">หมายเหตุ</th></tr></thead>
                            <tbody>
                                ${myReadHistory.length===0 ? `<tr><td colspan="5" class="p-6 text-center text-gray-400">ยังไม่มีประวัติการอ่าน</td></tr>` : myReadHistory.map(h => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-3 text-gray-600">${new Date(h.date).toLocaleDateString('th-TH')}</td>
                                        <td class="p-3 font-semibold">${h.type}</td>
                                        <td class="p-3 text-blue-600">${h.type === 'ขาดเรียน' ? '-' : `หน้า ${h.startPage} - ${h.endPage}`}</td>
                                        <td class="p-3 text-center"><span class="px-2 py-1 rounded text-xs font-bold ${h.status==='ผ่าน'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}">${h.status}</span></td>
                                        <td class="p-3 text-gray-500">${h.note || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- ประวัติการเข้า-ออกหอพัก -->
                <div class="bg-white rounded-xl shadow overflow-hidden mb-6">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 class="font-bold text-gray-700"><i class="fa-solid fa-clock-rotate-left mr-2"></i>ประวัติการเข้า-ออกหอพัก (7 ล่าสุด)</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-600">
                                    <th class="p-3">วัน-เวลา</th>
                                    <th class="p-3">ประเภท</th>
                                    <th class="p-3 text-center">รูปถ่าย (ตอนเข้า)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${myHistory.length === 0 ? `<tr><td colspan="3" class="p-6 text-center text-gray-400">ยังไม่มีประวัติการทำรายการ</td></tr>` : 
                                  myHistory.map(h => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-3 font-medium text-gray-700">${formatDate(h.timestamp)}</td>
                                        <td class="p-3">
                                            ${h.type === 'in'

        // --- Helper for Gender Count ---
        function countGender(studentsList) {
            let m = 0, f = 0;
            studentsList.forEach(s => {
                const n = (s.name || '').trim();
                // ตรวจสอบคำนำหน้าชื่อเพื่อแยกเพศ
                if (/^(นาย|เด็กชาย|ด\.ช\.)/.test(n)) m++;
                else if (/^(นาง|นางสาว|น\.ส\.|เด็กหญิง|ด\.ญ\.)/.test(n)) f++;
            });
            return { m, f };
        }

        // --- Check-in Logic ---
        async function startCamera() {
            stopCamera(); 
            const video = document.getElementById('checkinVideo');
            const loading = document.getElementById('cameraLoading');
            const gpsStatus = document.getElementById('gpsStatus');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => { currentPosition = pos.coords; if(gpsStatus) gpsStatus.innerHTML = `<span class="text-green-600 font-bold"><i class="fa-solid fa-check"></i> ได้รับพิกัดปัจจุบัน</span>`; },
                    err => { if(gpsStatus) gpsStatus.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> ไม่สามารถดึงพิกัดได้</span>`; }
                );
            }
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                if(video) { video.srcObject = cameraStream; video.onloadedmetadata = () => { if(loading) loading.classList.add('hidden'); }; }
            } catch (err) {
                if(loading) loading.innerHTML = `<i class="fa-solid fa-video-slash text-red-500 text-3xl mb-2"></i><br>กล้องไม่พร้อมใช้งาน`;
            }
        }
        function stopCamera() { 
            if (cameraStream) { 
                cameraStream.getTracks().forEach(track => { track.stop(); }); 
                cameraStream = null; 
            }
            const video = document.getElementById('checkinVideo');
            if (video) {
                video.pause();
                video.srcObject = null;
                video.removeAttribute('src'); 
                video.load(); 
            }
        }
        function takePhoto() {
            const video = document.getElementById('checkinVideo'); const canvas = document.getElementById('checkinCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            video.classList.add('hidden'); canvas.classList.remove('hidden');
            document.getElementById('btnCapture').classList.add('hidden'); document.getElementById('btnRetake').classList.remove('hidden'); document.getElementById('btnSubmitCheckin').classList.remove('hidden');
        }
        function retakePhoto() {
            document.getElementById('checkinVideo').classList.remove('hidden'); document.getElementById('checkinCanvas').classList.add('hidden');
            document.getElementById('btnCapture').classList.remove('hidden'); document.getElementById('btnRetake').classList.add('hidden'); document.getElementById('btnSubmitCheckin').classList.add('hidden');
        }
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

                                Swal.showValidationMessage(`มีการอ่านหน้าซ้ำ! (หน้าล่าสุดที่อ่านคือ ${currentPagesRead}) หากจะให้ผ่าน ควรเริ่มอ่านที่หน้า ${expectedStart}`);
                                return false;
                            }
                            if (startPage > expectedStart) {
                                Swal.showValidationMessage(`มีการข้ามหน้า! ควรเริ่มอ่านที่หน้า ${expectedStart}`);
                                return false;
                            }
                            if (s.readTarget > 0 && endPage > s.readTarget) {
                                Swal.showValidationMessage(`หน้าที่ระบุเกินกว่าเป้าหมายที่ตั้งไว้ (${s.readTarget} หน้า)`);
                                return false;
                            }
                        }
                    }
                    
                    return { studentId: s.id, type, startPage, endPage, score, status, note }
                }
            }).then(async res => {
                if(res.isConfirmed) {
                    Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        const rdId = "RD-" + Date.now();
                        const data = res.value; 
                        data.id = rdId; 
                        data.date = new Date().toISOString();
                        
                        await db.collection(getColPath("readingHistory")).doc(rdId).set(data);
                        
                        if(data.type !== 'ขาดเรียน' && data.status === 'ผ่าน' && data.endPage >= data.startPage) {
                            const pagesRead = data.endPage - data.startPage + 1;
                            await db.collection(getColPath("students")).doc(data.studentId).update({ pagesRead: firebase.firestore.FieldValue.increment(pagesRead) });
                        }
                        
                        Swal.fire('บันทึกสำเร็จ', 'อัปเดตความก้าวหน้าการอ่านเรียบร้อย', 'success');
                    } catch(e) { Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error'); }
                }
            });
        }

                                        const room = String(row['ห้องพัก'] || '-').trim();
                                        const bed = String(row['เตียง'] || '-').trim();
                                        const readTarget = parseInt(row['เป้าหมายอ่าน(หน้า)']) || 100;

                                        if(!id || !name) return null;

                                        return { id, name, phone, room, bed, score: 100, status: 'out', latestPhoto: "", groupId: groupId, readTarget: readTarget, pagesRead: 0 };
                                    }).filter(item => item !== null);

                                    if(students.length === 0) {
                                        Swal.showValidationMessage('ข้อมูลไม่ถูกต้อง กรุณาเช็คหัวตาราง (รหัสนักเรียน, ชื่อ-นามสกุล)');
                                        resolve(false);
                                    } else {
                                        resolve({ type: 'bulk', data: students });
                                    }
                                } catch(err) {
                                    Swal.showValidationMessage('เกิดข้อผิดพลาดในการอ่านไฟล์');
                                    resolve(false);
                                }
                            };
                            reader.readAsArrayBuffer(file);
                        });
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        if (result.value.type === 'single') {
                            await db.collection(getColPath("students")).doc(result.value.data.id).set(result.value.data);
                            Swal.fire('สำเร็จ', 'เพิ่มนักเรียนเข้ากลุ่มเรียบร้อยแล้ว', 'success');
                        } else if (result.value.type === 'bulk') {
                            const batch = db.batch();
                            result.value.data.forEach(student => {
                                const ref = db.collection(getColPath("students")).doc(student.id);
                                batch.set(ref, student);
                            });
                            await batch.commit();
                            Swal.fire('สำเร็จ', `นำเข้านักเรียนจำนวน ${result.value.data.length} คน เรียบร้อยแล้ว`, 'success');
                        }
                    } catch(e) { Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้: ' + e.message, 'error'); }
                }
            });
        }
        
        window.downloadStudentTemplate = function() {
            const ws_data = [
                ['รหัสนักเรียน', 'ชื่อ-นามสกุล', 'เบอร์ติดต่อ', 'ห้องพัก', 'เตียง', 'เป้าหมายอ่าน(หน้า)'],
                ['04001', 'นายสมชาย ใจดี', '0812345678', '101', 'A1', 100],
                ['04002', 'นางสาวสมหญิง รักเรียน', '0898765432', '101', 'A2', 120]
            ];
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, "Student_Template.xlsx");
        };

        function openEditStudent(id) {
            const s = appData.students.find(x => String(x.id) === String(id));
            if(!s) return;

            let groupOptions = '';
            if (currentUser.role === 'guardian') {
                const myGroups = appData.groups.filter(g => g.guardianId === currentUser.data.id);
                groupOptions = myGroups.map(g => `<option value="${g.id}" ${s.groupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('');
            } else {
                groupOptions = appData.groups.map(g => `<option value="${g.id}" ${s.groupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('');
            }

            Swal.fire({
                title: 'แก้ไขข้อมูลนักเรียน',
                html: `
                    <div class="text-left space-y-3 mt-2">
                        <div><label class="text-sm font-semibold text-gray-700">รหัสนักเรียน</label><input id="edit-s-id" class="w-full border p-2.5 rounded bg-gray-100 text-gray-500 mt-1" value="${s.id}" readonly></div>
                        <div><label class="text-sm font-semibold text-gray-700">กลุ่ม <span class="text-red-500">*</span></label><select id="edit-s-group" class="w-full border p-2.5 rounded outline-none focus:ring-2 focus:ring-blue-400 mt-1">${groupOptions}</select></div>
                        <div><label class="text-sm font-semibold text-gray-700">ชื่อ-นามสกุล <span class="text-red-500">*</span></label><input id="edit-s-name" class="w-full border p-2.5 rounded outline-none focus:ring-2 focus:ring-blue-400 mt-1" value="${s.name}"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-sm font-semibold text-gray-700">เบอร์ติดต่อ</label><input id="edit-s-phone" class="w-full border p-2.5 rounded outline-none focus:ring-2 focus:ring-blue-400 mt-1" value="${s.phone || ''}"></div>
                            <div><label class="text-sm font-semibold text-gray-700">เป้าหมายอ่าน</label><input id="edit-s-target" type="number" class="w-full border p-2.5 rounded outline-none focus:ring-2 focus:ring-blue-400 mt-1" value="${s.readTarget || 100}"></div>
                            <div><label class="text-sm font-semibold text-gray-700">ห้องพัก</label><input id="edit-s-room" class="w-full border p-2.5 rounded outline-none focus:ring-2 focus:ring-blue-400 mt-1" value="${s.room || ''}"></div>
                            <div><label class="text-sm font-semibold text-gray-700">เตียง</label><input id="edit-s-bed" class="w-full border p-2.5 rounded outline-none focus:ring-2 focus:ring-blue-400 mt-1" value="${s.bed || ''}"></div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'บันทึกการแก้ไข',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#3b82f6',
                preConfirm: () => {
                    const name = document.getElementById('edit-s-name').value.trim();
                    const phone = document.getElementById('edit-s-phone').value.trim();
                    const room = document.getElementById('edit-s-room').value.trim();
                    const bed = document.getElementById('edit-s-bed').value.trim();
                    const groupId = document.getElementById('edit-s-group').value;
                    const readTarget = parseInt(document.getElementById('edit-s-target').value) || 100;
                    
                    if (!name || !groupId) {
                        Swal.showValidationMessage('กรุณากรอกข้อมูลที่มี * ให้ครบ');
                        return false;
                    }
                    return { id: s.id, name, phone, room, bed, groupId, readTarget };
                }
            }).then(async (res) => {
                if (res.isConfirmed) {
                    Swal.fire({ title: 'กำลังอัปเดต...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        await db.collection(getColPath("students")).doc(res.value.id).update({
                            name: res.value.name, phone: res.value.phone, room: res.value.room, bed: res.value.bed, groupId: res.value.groupId, readTarget: res.value.readTarget
                        });
                        Swal.fire('สำเร็จ', 'อัปเดตข้อมูลนักเรียนเรียบร้อยแล้ว', 'success');
                    } catch(e) { Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error'); }
                }
            });
        }

        function deleteStudentAction(id) {
            Swal.fire({
                title: 'ยืนยันการลบนักเรียน?',
                text: "หากลบแล้ว ข้อมูลนักเรียนคนนี้จะหายไปจากตาราง",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#9ca3af',
                confirmButtonText: 'ใช่, ลบเลย',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังลบข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        await db.collection(getColPath("students")).doc(id).delete();
                        Swal.fire('ลบสำเร็จ!', 'ข้อมูลนักเรียนถูกนำออกจากระบบแล้ว', 'success');
                    } catch(e) { Swal.fire('ข้อผิดพลาด', 'ไม่สามารถลบข้อมูลได้', 'error'); }
                }
            });
        }

        function exportExcel() {
            let csv = "กลุ่ม,รหัสนักเรียน,ชื่อ-สกุล,เป้าหมาย,อ่านแล้ว,คิดเป็นเปอร์เซ็นต์\n";
            appData.groups.forEach(g => {
                const studs = appData.students.filter(s => s.groupId === g.id);
                studs.forEach(s => {
                    let pct = s.readTarget === 0 ? 100 : (s.readTarget > 0 ? Math.round(((s.pagesRead||0)/s.readTarget)*100) : 0);
                    csv += `${g.name},${s.id},${s.name},${s.readTarget},${s.pagesRead||0},${pct}%\n`;
                });
            });
            const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Reading_Progress.csv"; link.click();
        }

        function formatDate(iso) { if(!iso) return "-"; return new Date(iso).toLocaleString('th-TH', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})+' น.'; }
        
        window.onload = window.initApp;
        
    </script>
</body>
